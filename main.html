<!DOCTYPE html>
<html>
<head>
  <title>Styled Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
    }

    table {
      width: 60%;
      margin: 40px auto;
      border-collapse: collapse;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      background-color: white;
    }

    thead {
      background-color: #2c3e50;
      color: white;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border: 1px solid #ddd;
    }

    tbody tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tbody tr:hover {
      background-color: #d6eaf8;
    }

    th {
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <table>
    <!-- Table Head -->
    <thead>
      <tr>
        <th>Subject</th>
        <th>Marks</th>
        <th>Grade</th>
      </tr>
    </thead>

    <!-- Table Body -->
    <tbody>
      <tr>
        <td>Math</td>
        <td>95</td>
        <td>A+</td>
      </tr>
      <tr>
        <td>Science</td>
        <td>88</td>
        <td>A</td>
      </tr>
      <tr>
        <td>English</td>
        <td>92</td>
        <td>A+</td>
      </tr>
      <tr>
        <td>Computer</td>
        <td>98</td>
        <td>A+</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
